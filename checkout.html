<!DOCTYPE html>
<html>
<head><title>Checkout - lora</title>
<style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
    input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    .btn { background: #006BDF; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; cursor: pointer; }
    .order-summary { background: #f9f9f9; padding: 20px; margin: 20px 0; border-radius: 5px; }
</style>
</head>
<body>
    <div class="container">
        <h1>Checkout</h1>
        <input type="text" id="name" placeholder="Full Name *">
        <input type="email" id="email" placeholder="Email (optional)">
        <input type="tel" id="phone" placeholder="Phone *">
        <textarea id="address" placeholder="Address *"></textarea>
        <select id="city">
            <option value="Casablanca">Casablanca</option>
            <option value="Rabat">Rabat</option>
            <option value="Fes">Fes</option>
            <option value="Marrakech">Marrakech</option>
            <option value="Agadir">Agadir</option>
            <option value="Tangier">Tangier</option>
        </select>
        <div class="order-summary" id="order-summary"></div>
        <button class="btn" onclick="placeOrder()">Place Order</button>
    </div>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function displaySummary() {
            let total = 0;
            let items = '';
            cart.forEach(item => {
                total += item.price * item.quantity;
                items += `<p>${item.name} x${item.quantity} - ${item.price * item.quantity} MAD</p>`;
            });
            document.getElementById('order-summary').innerHTML = `
                <h3>Order Summary</h3>
                ${items}
                <p><strong>Total: ${total} MAD</strong></p>
            `;
        }
        
        function placeOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            
            if (!name || !phone || !address) {
                alert('Please fill all required fields');
                return;
            }
            
            alert('✅ Order placed successfully! Thank you for your purchase.');
            localStorage.removeItem('cart');
            window.location.href = 'index.html';
        }
        
        displaySummary();
    </script>
</body>
</html>
